services:
  db:
    image: mysql
    build:
      context: ./DataBase
      dockerfile: Dockerfile
    container_name: MYSQL
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: "admin"
      MYSQL_DATABASE: "GPA"
    volumes:
      - mysql_data:/var/lib/mysql

  architect-manager:
    build:
      context: ./architect-manager
      dockerfile: Dockerfile
    container_name: ARCHITECT_MANAGER
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: admin
      DB_NAME: GPA
      NODE_ENV: production
    ports:
      - 3000:3000
    volumes:
      - uploads_data:/app/public/uploads

volumes:
  mysql_data:
  uploads_data:
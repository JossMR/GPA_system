services:
  db:
    image: mysql
    container_name: MYSQL
    ports: 
      - 3306:3306
    environment: 
      MYSQL_ROOT_PASSWORD: "admin"
      MYSQL_DATABASE: "GPA"
    volumes: 
      - ./schemas:/var/lib/mysql

  architect-manager:
    build:
      context: ./architect-manager
      dockerfile: Dockerfile
    container_name: ARCHITECT_MANAGER
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: admin
      DB_NAME: GPA
      NODE_ENV: production
    ports:
      - 3000:3000
    volumes:
      - ./architect-manager/public/uploads:/app/public/uploads